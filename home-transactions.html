<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Transactions – Expense</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Custom Material Theme -->
    <link rel="stylesheet" href="globals.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-blur: 10px;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .table-container {
            border-radius: 16px;
            overflow: hidden;
            background: white;
        }

        .sticky-top {
            z-index: 10;
            background: rgba(248, 249, 250, 0.9) !important;
            backdrop-filter: blur(5px);
        }

        .animate-fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .total-badge {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.3);
            transition: all 0.3s ease;
        }

        .total-badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(52, 152, 219, 0.4);
        }

        .filter-select {
            border-radius: 14px;
            padding: 12px 20px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            background-color: white;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .filter-select:hover {
            border-color: var(--md-primary);
        }

        .btn-back {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.05);
            color: var(--md-primary);
            border-radius: 14px;
            padding: 10px 18px;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: var(--md-primary);
            color: white;
            transform: translateX(-5px);
        }

        tr {
            transition: background-color 0.2s ease;
        }

        .badge-source {
            font-weight: 500;
            letter-spacing: 0.5px;
            background: rgba(52, 152, 219, 0.08) !important;
            color: var(--md-primary) !important;
            border: 1px solid rgba(52, 152, 219, 0.2) !important;
        }
    </style>
</head>

<body class="py-4 py-md-5">
    <div class="container py-2">
        <!-- Header -->
        <div class="d-flex flex-column flex-md-row align-items-md-center mb-5 gap-4">
            <!-- <a href="index.html" class="btn btn-back d-flex align-items-center justify-content-center shadow-sm"
                style="width: fit-content;">
                <span class="material-icons align-middle me-1">arrow_back</span> Back
            </a> -->
            <div class="flex-grow-1">
                <h1 class="display-6 fw-bold text-primary mb-1">Home Transactions</h1>
                <p class="text-muted mb-0 d-flex align-items-center">
                    <span class="material-icons fs-6 me-1 text-primary">house</span> Viewing only transactions where
                    owner is <strong>Home</strong>
                </p>
            </div>
            <div class="d-flex align-items-center">
                <div class="total-badge d-flex align-items-center">
                    <span class="material-icons me-2">account_balance_wallet</span>
                    <span id="total-amount">₹0</span>
                </div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="glass-card p-3 mb-4">
            <div class="row g-3 align-items-center">
                <div class="col-12 col-md-4">
                    <div class="d-flex align-items-center gap-3">
                        <label class="small fw-bold text-uppercase text-muted whitespace-nowrap mb-0"
                            style="min-width: 60px;">Month</label>
                        <select id="filter-month" class="form-select filter-select shadow-sm border-0">
                            <option value="All">All Months</option>
                        </select>
                    </div>
                </div>
                <div class="col-12 col-md-8 text-md-end">
                    <span class="text-muted small">Read-only view of filtered data</span>
                </div>
            </div>
        </div>

        <!-- Transactions Table -->
        <div class="glass-card overflow-hidden">
            <div class="table-responsive" style="max-height: 65vh;">
                <table class="table table-hover align-middle mb-0">
                    <thead class="sticky-top shadow-sm">
                        <tr>
                            <th class="ps-4">Date</th>
                            <th>Source</th>
                            <th>Details</th>
                            <th>Amount</th>
                            <th class="text-end pe-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-list">
                        <!-- Dynamic Rows -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-4 text-center">
            <p class="text-muted small">Powered by Firestore • Smart Financial Management</p>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="src/home-transactions.js"></script>
</body>

</html>
